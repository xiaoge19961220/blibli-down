name: Build and Release BiliArchiver

on:
  push:
    tags:
      - 'v*'
  # 关键：加上这一行，允许手动触发
  workflow_dispatch:
    # 还可以选择性地配置手动触发时的输入参数（选填）
    inputs:
      version:
        description: '手动发布的版本号 (例如 v1.0.0)'
        required: false
        default: 'v1.0.0'
permissions:
  contents: write

jobs:
  build:
    name: Build Electron App (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build App & Generate Binaries
        shell: bash
        run: |
          npm run build
          cp package.json dist/package.json
          mkdir -p dist-desktop
          cd dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            powershell -Command "Compress-Archive -Path * -DestinationPath ../dist-desktop/dist.zip -Force"
          else
            zip -r ../dist-desktop/dist.zip .
          fi
          cd ..
          npx electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BiliArchiver-${{ matrix.os }}
          path: |
            dist-desktop/*.dmg
            dist-desktop/*.exe
            dist-desktop/*.yml
            dist-desktop/*.blockmap
            dist-desktop/*.zip
          if-no-files-found: ignore
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true

      - name: Create and Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-release/*.dmg
            dist-release/*.exe
            dist-release/*.yml
            dist-release/*.blockmap
            dist-release/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
